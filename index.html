<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>LNX Technologies</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 16px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
            padding: 40px 24px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 48px;
        }

        .company-logo {
            max-width: 220px;
            height: auto;
            display: inline-block;
        }

        .contacts-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            background: #f8f9fc;
            border-radius: 30px;
            padding: 14px 20px;
            text-decoration: none;
            color: #1c1c1e;
            border: 1px solid #e9e9ed;
            transition: 0.2s;
        }

        .contact-item:active {
            background: #f0f0f5;
            transform: scale(0.98);
        }

        .social-icon {
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            overflow: hidden;
        }
        
        .social-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .social-info {
            flex: 1;
        }

        .social-name {
            font-size: 17px;
            font-weight: 600;
            color: #000;
        }

        .social-handle {
            font-size: 14px;
            color: #666;
            margin-top: 2px;
        }

        .chevron {
            color: #999;
            font-size: 20px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo LNX Technologies -->
        <div class="logo-container">
            <img src="LNX_Technologies.png" alt="LNX Technologies" class="company-logo">
        </div>

        <!-- Lista contatti social -->
        <div class="contacts-list">
            <!-- Instagram -->
            <a href="https://www.instagram.com/lnx_technologies?igsh=MWh6YzgxMWVoYmtibQ%3D%3D&utm_source=qr" class="contact-item" target="_blank">
                <div class="social-icon">
                    <img src="Instagram_logo_2022.png" alt="Instagram">
                </div>
                <div class="social-info">
                    <div class="social-name">Instagram</div>
                    <div class="social-handle">@lnx_technologies</div>
                </div>
                <div class="chevron">›</div>
            </a>

            <!-- TikTok -->
            <a href="https://www.tiktok.com/@lnx_technologies?_r=1&_t=ZN-94NuHoXzAus" class="contact-item" target="_blank">
                <div class="social-icon">
                    <img src="logo_tiktok.jpg" alt="TikTok">
                </div>
                <div class="social-info">
                    <div class="social-name">TikTok</div>
                    <div class="social-handle">@lnx_technologies</div>
                </div>
                <div class="chevron">›</div>
            </a>

            <!-- Facebook -->
            <a href="https://www.facebook.com/share/1DMcY6hMe8/?mibextid=wwXIfr" class="contact-item" target="_blank">
                <div class="social-icon">
                    <img src="Logo_de_Facebook.png" alt="Facebook">
                </div>
                <div class="social-info">
                    <div class="social-name">Facebook</div>
                    <div class="social-handle">LNX Technologies</div>
                </div>
                <div class="chevron">›</div>
            </a>

            <!-- WhatsApp -->
            <a href="https://wa.me/393668781188" class="contact-item" target="_blank">
                <div class="social-icon">
                    <img src="logo_whatsapp.png" alt="WhatsApp">
                </div>
                <div class="social-info">
                    <div class="social-name">WhatsApp</div>
                    <div class="social-handle">366 878 1188</div>
                </div>
                <div class="chevron">›</div>
            </a>
        </div>
    </div>
</body>
</html>
